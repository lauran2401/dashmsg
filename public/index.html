<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DashMsg</title>
  <link rel="stylesheet" href="./app/styles.css" />
</head>
<body>
  <div class="container" id="app"></div>

  <script src="./app/core.js"></script>
  <script src="./app/ui.js"></script>
  <script src="./app/menus.js"></script>
  <script src="./app/editors.js"></script>
  
  <script>
window.addEventListener("load", function () {
  if (window.DashMsg && DashMsg.init) {
    DashMsg.init();
  } else {
    document.body.innerHTML =
      "<pre style='color:white;background:black;padding:12px'>DashMsg failed to load (core.js missing?)</pre>";
  }
});
</script>

  <script>
    // Minimal boot + visible error surface (prevents “silent blank”)
    (function () {
      function showErr(e) {
        const msg = (e && (e.stack || e.message)) ? (e.stack || e.message) : String(e);
        document.body.innerHTML =
          '<pre style="white-space:pre-wrap;padding:12px;font:12px -apple-system;background:#111;color:#fff">' +
          msg.replaceAll('<','&lt;') +
          '</pre>';
      }
      window.addEventListener('error', ev => showErr(ev.error || ev.message));
      window.addEventListener('unhandledrejection', ev => showErr(ev.reason));

      try { DashMsg.init(); } catch (e) { showErr(e); }
    })();
  </script>
</body>
</html>
