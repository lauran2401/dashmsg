<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  
<link rel="stylesheet" href="style.css?v=2.0.0">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DashMsg</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container" id="app"></div>

  <script src="./app/ui.js"></script>
  <script src="./app/editors.js"></script>
  <script src="./app/menus.js"></script>
  <script src="./app/core.js"></script>

  <script>
    (function () {
      function showErr(e) {
        const msg = (e && (e.stack || e.message)) ? (e.stack || e.message) : String(e);
        document.body.innerHTML =
          '<pre style="white-space:pre-wrap;padding:12px;font:12px -apple-system;background:#111;color:#fff">' +
          msg.replaceAll('<','&lt;') +
          '</pre>';
      }
      window.addEventListener('error', ev => showErr(ev.error || ev.message));
      window.addEventListener('unhandledrejection', ev => showErr(ev.reason));

      try {
        if (window.DashMsg && typeof window.DashMsg.init === "function") window.DashMsg.init();
        else throw new Error("DashMsg did not attach to window (core.js loaded but window.DashMsg is missing).");
      } catch (e) { showErr(e); }
    })();
  </script>
</body>
</html>
